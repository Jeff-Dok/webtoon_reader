<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma Bibliothèque Webtoon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="library-header">
    <h1>Ma Collection Webtoon</h1>
  </header>

  <main>
    <section class="library-grid">

      <article class="webtoon-card" data-folder="Liebling!">
        <a href="Liebling!/lecteur.html">
          <img
            class="card-cover"
            src="Liebling!/cover.webp"
            alt="Couverture de Liebling !"
          >
          <div class="card-body">
            <h2 class="card-title">Liebling !</h2>
            <p class="card-progress" data-progress>▶ Commencer</p>
          </div>
        </a>
      </article>

    </section>
  </main>

  <script>
    // Placeholder image de couverture manquante (sans innerHTML/outerHTML)
    document.querySelectorAll('.card-cover').forEach(function(img) {
      img.addEventListener('error', function() {
        var placeholder = document.createElement('div');
        placeholder.className = 'card-cover-placeholder';
        placeholder.textContent = '\uD83D\uDCC2';
        img.replaceWith(placeholder);
      });
    });

    // Lecture de la progression pour chaque carte
    document.querySelectorAll('.webtoon-card[data-folder]').forEach(function(card) {
      var folder = card.dataset.folder;
      var raw = localStorage.getItem('webtoon_save_' + folder);
      if (raw === null) return;

      var state;
      try {
        state = JSON.parse(raw);
        if (typeof state !== 'object' || state === null) throw new Error();
      } catch (e) {
        // Ancien format : entier brut
        state = { chap: parseInt(raw, 10), scroll: 0, done: true };
      }

      var el = card.querySelector('[data-progress]');
      if (state.done || !state.scroll) {
        el.textContent = '\u25ba Continuer au Chapitre ' + state.chap;
      } else {
        el.textContent = '\u25ba Continuer le Chapitre ' + state.chap;
      }
    });
  </script>

</body>
</html>
