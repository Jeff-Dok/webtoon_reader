<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Bibliothèque Webtoon</title>
    <style>
        body { margin: 0; padding: 40px; background-color: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; }
        h1 { text-align: center; color: #e74c3c; margin-bottom: 40px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid #333;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100px;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #e74c3c;
            background: #252525;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .card h2 { margin: 0; font-size: 1.2em; }
        .folder-icon { font-size: 2em; margin-bottom: 10px; color: #e74c3c; }
    </style>
</head>
<body>

    <h1>Ma Collection Webtoon</h1>

    <div class="grid" id="library-grid">
	<a href="Liebling!/lecteur.html" class="card">
            <div class="folder-icon">📂</div>
            <h2>Liebling !</h2>
        </a>
    </div>

</body>
</html>
